name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: basex-linux
            asset_name: basex-linux.tar.gz
          - os: macos-latest
            artifact_name: basex-macos
            asset_name: basex-macos.zip
          - os: windows-latest
            artifact_name: basex-windows
            asset_name: basex-windows.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Configure CMake
        run: cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          tar -czf ../../${{ matrix.asset_name }} basex
          cd ../..

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip ../../${{ matrix.asset_name }} basex
          cd ../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd build/bin
          compress-archive -Path basex.exe -DestinationPath ../../${{ matrix.asset_name }}
          cd ../..

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
